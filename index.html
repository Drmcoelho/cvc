<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CVC Academy Launcher</title>
  <meta http-equiv="refresh" content="0; url=project/cvc_academy_v20_premium_dual_layer/index.html" />
  <style>
    :root { --bg:#0b1220; --panel:#122038; --text:#eef4ff; --muted:#a8b7d4; --accent:#5db8ff; --line:#274263; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(93,184,255,.16), transparent 35%),
        linear-gradient(160deg, #07101d 0%, var(--bg) 45%, #0f1c30 100%);
      color: var(--text);
    }
    .card {
      width: min(760px, 100%);
      padding: 28px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      box-shadow: 0 18px 48px rgba(0,0,0,.3);
    }
    h1 { margin: 0 0 12px; font-size: 2.2rem; }
    p { margin: 0 0 12px; color: var(--muted); line-height: 1.6; }
    a {
      display: inline-block;
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: 14px;
      text-decoration: none;
      color: #051526;
      background: linear-gradient(135deg, #7cc8ff, #b8e6ff);
      font-weight: 700;
    }
    .alt {
      display: block;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,.08);
      color: var(--muted);
      font-size: .95rem;
    }
    code { color: var(--text); }
  </style>
</head>
<body>
  <main class="card">
    <h1>CVC Academy</h1>
    <p>Este arquivo existe como launcher simples do projeto.</p>
    <p>Se o redirecionamento automatico nao acontecer, abra o indice canonico do bundle pelo link abaixo.</p>
    <a href="project/cvc_academy_v20_premium_dual_layer/index.html">Abrir o site offline</a>
    <div class="alt">
      Para o modo HTTP local via terminal, use <code>dashboard.zsh</code> na raiz deste workspace.
    </div>
  </main>
</body>
</html>
