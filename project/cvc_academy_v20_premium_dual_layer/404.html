<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CVC Academy · Pagina nao encontrada</title>
  <style>
    :root { --bg:#07101d; --panel:#122038; --text:#eef4ff; --muted:#a8b7d4; --accent:#5db8ff; --line:#274263; }
    * { box-sizing:border-box; }
    body {
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      font-family:Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(93,184,255,.14), transparent 35%),
        linear-gradient(160deg, #07101d 0%, #0b1220 45%, #0f1c30 100%);
      color:var(--text);
    }
    main {
      width:min(760px, 100%);
      padding:30px;
      border-radius:24px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      box-shadow:0 18px 48px rgba(0,0,0,.3);
    }
    h1 { margin:0 0 12px; font-size:2.2rem; }
    p { margin:0 0 12px; color:var(--muted); line-height:1.6; }
    .actions { margin-top:18px; display:flex; flex-wrap:wrap; gap:10px; }
    a {
      display:inline-block;
      padding:12px 16px;
      border-radius:14px;
      text-decoration:none;
      color:#051526;
      background:linear-gradient(135deg, #7cc8ff, #b8e6ff);
      font-weight:700;
    }
    a.secondary {
      color:var(--text);
      background:transparent;
      border:1px solid rgba(255,255,255,.14);
    }
  </style>
</head>
<body>
  <main>
    <h1>Pagina nao encontrada</h1>
    <p>Voce caiu em uma rota que nao existe no bundle publicado do CVC Academy.</p>
    <p>Use a home do bundle para voltar ao indice canonico, ao dashboard ou a arena de treino.</p>
    <div class="actions">
      <a href="./index.html">Ir para a home</a>
      <a class="secondary" href="./pages/dashboard-alpha.html">Abrir dashboard</a>
      <a class="secondary" href="./pages/training-arena.html">Abrir arena</a>
    </div>
  </main>
</body>
</html>
